name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-beta*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.value }}
      prerelease: ${{ steps.prerelease.outputs.value }}
    steps:
      - name: Determine channel
        id: channel
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == *"-beta"* ]]; then
            echo "value=beta" >> "$GITHUB_OUTPUT"
          else
            echo "value=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Is prerelease
        id: prerelease
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == *"-beta"* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: meta
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: pnpm install

      - name: Build & publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_GITHUB_REPO: Eg0r0k/AudioGram
          VITE_UPDATE_CHANNEL: ${{ needs.meta.outputs.channel }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: AudioGram ${{ github.ref_name }}
          releaseDraft: false
          prerelease: ${{ needs.meta.outputs.prerelease == 'true' }}
          tauriScript: pnpm tauri

  publish-manifest:
    needs: [meta, build]
    if: needs.meta.outputs.channel == 'stable'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNEL: ${{ needs.meta.outputs.channel }}
          VERSION: ${{ steps.version.outputs.value }}
          REPO: Eg0r0k/AudioGram
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p "docs/manifests/${CHANNEL}"

          echo "Waiting for GitHub release to become available..."
          RELEASE=""

          for i in {1..24}; do
            if RELEASE=$(gh release view "$TAG" --repo "$REPO" --json assets,body,publishedAt,isDraft 2>/dev/null); then
              echo "Release found on attempt $i"
              break
            fi

            echo "Release not available yet (attempt $i/24). Waiting 10s..."
            sleep 10
          done

          if [ -z "$RELEASE" ]; then
            echo "Release was not found after retries."
            exit 1
          fi

          echo "Raw release payload:"
          echo "$RELEASE" | jq '.'

          IS_DRAFT=$(echo "$RELEASE" | jq -r '.isDraft')
          PUB_DATE=$(echo "$RELEASE" | jq -r '.publishedAt')

          echo "IS_DRAFT=$IS_DRAFT"
          echo "PUB_DATE=$PUB_DATE"

          if [ "$IS_DRAFT" = "true" ] || [ "$PUB_DATE" = "null" ]; then
            echo "Release exists but is draft/unpublished."
            exit 1
          fi

          echo "Release assets:"
          echo "$RELEASE" | jq -r '.assets[]?.name'

          WIN_URL=$(echo "$RELEASE" | jq -r '.assets[]? | select(.name | test("x64-setup\\.exe$")) | .url // empty' | head -n1)
          WIN_SIG_URL=$(echo "$RELEASE" | jq -r '.assets[]? | select(.name | test("x64-setup\\.exe\\.sig$")) | .url // empty' | head -n1)
          LINUX_URL=$(echo "$RELEASE" | jq -r '.assets[]? | select(.name | test("\\.AppImage$")) | .url // empty' | head -n1)
          LINUX_SIG_URL=$(echo "$RELEASE" | jq -r '.assets[]? | select(.name | test("\\.AppImage\\.sig$")) | .url // empty' | head -n1)

          echo "Resolved asset URLs:"
          echo "WIN_URL=$WIN_URL"
          echo "WIN_SIG_URL=$WIN_SIG_URL"
          echo "LINUX_URL=$LINUX_URL"
          echo "LINUX_SIG_URL=$LINUX_SIG_URL"

          if [ -z "$WIN_URL" ] || [ -z "$WIN_SIG_URL" ] || [ -z "$LINUX_URL" ] || [ -z "$LINUX_SIG_URL" ]; then
            echo "Required assets are missing."
            exit 1
          fi

          echo "Downloading signatures..."
          WIN_SIG=$(curl -fsSL "$WIN_SIG_URL")
          LINUX_SIG=$(curl -fsSL "$LINUX_SIG_URL")
          NOTES=$(echo "$RELEASE" | jq -r '.body // ""')

          echo "Signature lengths:"
          echo "WIN_SIG length: ${#WIN_SIG}"
          echo "LINUX_SIG length: ${#LINUX_SIG}"

          jq -n \
            --arg version "${VERSION}" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg win_url "$WIN_URL" \
            --arg win_sig "$WIN_SIG" \
            --arg linux_url "$LINUX_URL" \
            --arg linux_sig "$LINUX_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { url: $win_url, signature: $win_sig },
                "linux-x86_64": { url: $linux_url, signature: $linux_sig }
              }
            }' > "docs/manifests/${CHANNEL}/latest.json"

          echo "Generated docs/manifests/${CHANNEL}/latest.json:"
          cat "docs/manifests/${CHANNEL}/latest.json"

      - name: Commit & push manifest
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/

          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "chore: manifest ${{ github.ref_name }} [${{ needs.meta.outputs.channel }}]"
          git push